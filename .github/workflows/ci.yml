name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate catalog artifacts
        run: pnpm vitest run --config vitest.core.config.ts packages/cli/src/index.test.ts -t "validates repository catalog against repository schema"

      - name: Run package tests
        run: pnpm test:packages

      - name: Run app checks
        run: pnpm check
